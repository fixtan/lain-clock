<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div id="clock-container" class="clock-floating">
      <svg id="analog-clock" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="48" class="clock-face-outer" />
        <circle cx="50" cy="50" r="45" class="clock-face-inner" />
        <g id="hands">
          <polygon id="hour"   points="48,50 50,25 52,50 50,55" class="hand hour-hand" />
          <polygon id="minute" points="49,50 50,15 51,50 50,55" class="hand min-hand"  />
          <line    id="second" x1="50" y1="55" x2="50" y2="10"  class="hand sec-hand"  />
          <circle cx="50" cy="50" r="1.5" fill="#fff" />
        </g>
      </svg>
    </div>

    <!-- 右クリックメニュー（HIDEを追加） -->
    <div id="clock-context-menu" class="context-menu hidden">
      <ul>
        <li data-action="theme-wired">Theme: Wired (Green)</li>
        <li data-action="theme-terminal">Theme: Terminal (Cyan)</li>
        <!--li data-action="resize-small">Size: Small</li>
        <li data-action="resize-large">Size: Large</li>
        <li data-action="resize-full">Size: Full</li-->
        <li class="menu-slider-item">
          <div class="slider-label">Size: <span id="size-value">80</span>px</div>
          <input type="range" id="size-slider" min="80" max="500" step="5" value="80">
        </li>
        <li data-action="hide" class="menu-hide-item">── HIDE ──</li>
      </ul>
    </div>

    <!-- CLOCKサイドタブ（HIDE時に右端に出現・上下ドラッグ可） -->
    <div id="clock-tab" class="clock-tab hidden" title="Show Clock">
      <span class="tab-emoji">🕒</span>
      <span class="tab-label">CLOCK</span>
    </div>
  </body>
</html>
